name: bunjang-alert

concurrency:
  group: bunjang-alert
  cancel-in-progress: true
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run alert
        env:
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          KEYWORD:   ${{ secrets.KEYWORD }}
        run: python bunjang_alert.py

      - name: Commit state file
        run: |
          if [ -f bunjang_state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bunjang_state.json
            git commit -m "Update bunjang state" || echo "No changes to commit"
            git push
          else
            echo "No bunjang_state.json found"
          fi
