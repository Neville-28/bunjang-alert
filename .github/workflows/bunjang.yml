name: bunjang-alert

on:
  schedule:
    - cron: "*/5 * * * *"   # 每5分钟（UTC）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: bunjang_state.json
          key: bunjang-state-${{ github.ref_name }}
          restore-keys: |
            bunjang-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run alert
        env:
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          KEYWORD:   ${{ secrets.KEYWORD }}
        run: python bunjang_alert.py

      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: bunjang_state.json
          key: bunjang-state-${{ github.ref_name }}-${{ github.run_id }}
